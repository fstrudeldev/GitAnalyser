name: Build and Release Executables

on:
  push:
    branches:
      - release

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and target folder
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}

      # Install Linux dependencies for OpenSSL and git2
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev cmake

      - name: Build Release Executable
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create Release Archive (Windows ZIP)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path release_pkg
          Copy-Item target\${{ matrix.target }}\release\*.exe release_pkg\
          Copy-Item target\${{ matrix.target }}\release\deps\bevy_dylib-*.dll release_pkg\bevy_dylib.dll -ErrorAction SilentlyContinue
          # Also copy any other dlls just in case
          Copy-Item target\${{ matrix.target }}\release\deps\*.dll release_pkg\ -ErrorAction SilentlyContinue
          Compress-Archive -Path release_pkg\* -DestinationPath Windows-Build-v1.0.${{ github.run_number }}.zip
        shell: powershell

      - name: Create Release Archive (Linux TAR.GZ)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p release_pkg
          cp target/${{ matrix.target }}/release/GitAnalyser release_pkg/
          cp GitAnalyser.1 release_pkg/
          cp install.sh release_pkg/
          tar -czvf Linux-Build-v1.0.${{ github.run_number }}.tar.gz -C release_pkg .

      - name: Create GitHub Release and Upload Asset (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Release v1.0.${{ github.run_number }}"
          body: "Automated incremental builds for the release branch. Generated by GitHub Actions run #${{ github.run_number }}."
          files: Windows-Build-v1.0.${{ github.run_number }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and Upload Asset (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Release v1.0.${{ github.run_number }}"
          body: "Automated incremental builds for the release branch. Generated by GitHub Actions run #${{ github.run_number }}."
          files: Linux-Build-v1.0.${{ github.run_number }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
